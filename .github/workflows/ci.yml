name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript-check:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: TypeScript build
        run: npm run build
      - name: Run TypeScript tests
        run: npm test
      - name: Pipeline smoke test
        run: npm run test:pipeline
      - name: Redis health (memory fallback)
        run: npm run redis:health

  go-check:
    name: Go Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.22"
      - name: Build CLI
        run: cd cli && go build ./...
      - name: Test CLI
        run: cd cli && go test ./...
      - name: Vet
        run: cd cli && go vet ./...

  rust-check:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build core
        run: cd core && cargo build
      - name: Test core
        run: cd core && cargo test
      - name: Clippy
        run: cd core && cargo clippy -- -D warnings

  verify-files:
    name: Verify Required Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check required files
        run: |
          test -f README.md          && echo "README.md OK"
          test -f LICENSE            && echo "LICENSE OK"
          test -f CONTRIBUTING.md    && echo "CONTRIBUTING.md OK"
          test -f SECURITY.md        && echo "SECURITY.md OK"
          test -f CODE_OF_CONDUCT.md && echo "CODE_OF_CONDUCT.md OK"
          test -f .env.example       && echo ".env.example OK"
          test -f package.json       && echo "package.json OK"
          test -f tsconfig.json      && echo "tsconfig.json OK"
