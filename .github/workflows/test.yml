name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:pipeline
