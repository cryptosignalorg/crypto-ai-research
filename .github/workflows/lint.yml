name: Lint & Format

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  typescript:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
